name: Build Flutter APK
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 建议升级到 v4
      
      - name: Setup Java
        uses: actions/setup-java@v4  # 建议升级到 v4
        with:
          distribution: 'zulu'
          java-version: '17'         # 【重要修改】这里把 11 改成 17
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'    # 【关键修改】改成使用 stable 通道，它会自动拉取最新稳定版
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4 # 建议升级到 v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
